name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.build_type }})
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        build_type: [Debug, Release]

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout
      # -----------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # -----------------------------------------------------------------------
      # 2. Install system packages
      # -----------------------------------------------------------------------
      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake \
            ninja-build \
            clang \
            clang-tidy \
            libssl-dev \
            pkg-config \
            zlib1g-dev \
            ca-certificates

      # -----------------------------------------------------------------------
      # 3. Restore FetchContent cache
      #    Key includes CMakeLists.txt hash to auto-invalidate on dep changes.
      # -----------------------------------------------------------------------
      - name: Restore FetchContent cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.fetchcontent
          key: fetchcontent-${{ runner.os }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: |
            fetchcontent-${{ runner.os }}-

      # -----------------------------------------------------------------------
      # 4. CMake Configure
      #    CMAKE_CXX_CLANG_TIDY is NOT set here; static analysis runs separately
      #    in step 7 to avoid analysing generated proto TUs.
      # -----------------------------------------------------------------------
      - name: Configure
        run: |
          cmake -B build/${{ matrix.build_type }} \
                -G Ninja \
                -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
                -DCMAKE_CXX_COMPILER=clang++ \
                -DFETCHCONTENT_BASE_DIR=${{ github.workspace }}/.fetchcontent

      # -----------------------------------------------------------------------
      # 5. Build
      # -----------------------------------------------------------------------
      - name: Build
        run: cmake --build build/${{ matrix.build_type }} --parallel

      # -----------------------------------------------------------------------
      # 6. Test
      # -----------------------------------------------------------------------
      - name: Test
        run: |
          ctest --test-dir build/${{ matrix.build_type }} \
                --output-on-failure \
                --parallel "$(nproc)"

      # -----------------------------------------------------------------------
      # 7. clang-tidy (Debug variant only)
      #    Scoped to src/ to exclude generated proto headers and third-party code.
      # -----------------------------------------------------------------------
      - name: clang-tidy
        if: matrix.build_type == 'Debug'
        run: |
          run-clang-tidy -p build/Debug src/

  # ---------------------------------------------------------------------------
  # docker-build — verify the multi-stage Dockerfile builds cleanly.
  # Runs after ALL matrix variants of build-and-test pass.
  # Does NOT push to any registry.
  # ---------------------------------------------------------------------------
  docker-build:
    name: Docker Build
    runs-on: ubuntu-24.04
    needs: build-and-test

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout
      # -----------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # 2. Set up Docker Buildx (required for --platform flag)
      # -----------------------------------------------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # -----------------------------------------------------------------------
      # 3. Restore Docker layer cache
      #    Key is keyed on Dockerfile content; invalidates automatically on
      #    any Dockerfile change.
      # -----------------------------------------------------------------------
      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: docker-${{ hashFiles('Dockerfile') }}
          restore-keys: |
            docker-

      # -----------------------------------------------------------------------
      # 4. Build image (linux/amd64, no push)
      #    --load exports the image to the local Docker daemon for smoke-testing
      #    if needed in a follow-up step; the image is never pushed.
      # -----------------------------------------------------------------------
      - name: Build Docker image
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --cache-from type=local,src=/tmp/.buildx-cache \
            --cache-to   type=local,dest=/tmp/.buildx-cache-new,mode=max \
            -t hello-service:ci \
            --load \
            .
          # Rotate cache directory to prevent unbounded cache growth
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache
